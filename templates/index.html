<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos - Oficina Mecânica</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Auto Mecânica Piau</h1>
        </header>

        <section class="cliente-info">
            <h2>Dados do Cliente</h2>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="nome">Nome do Cliente:</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone:</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000">
                </div>
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="veiculo">Veículo:</label>
                    <input type="text" id="veiculo" placeholder="Ex: Honda Civic 2020">
                </div>
                <div class="form-group">
                    <label for="placa">Placa:</label>
                    <input type="text" id="placa" placeholder="ABC-1234">
                </div>
                <div class="form-group">
                    <label for="data">Data:</label>
                    <input type="date" id="data">
                </div>
            </div>
        </section>

        <section class="pecas-section">
            <h2>Peças e Componentes</h2>
            <div class="peca-form">
                <input type="text" id="peca-nome" placeholder="Nome da Peça">
                <input type="number" id="peca-qtd" placeholder="Qtd" min="1" value="1">
                <input type="number" id="peca-valor" placeholder="Valor Unit." step="0.01">
                <button id="add-peca" class="btn-add">Adicionar Peça</button>
            </div>
            <div class="table-container">
                <table id="tabela-pecas">
                    <thead>
                        <tr>
                            <th>Peça</th>
                            <th>Qtd</th>
                            <th>V. Unit</th>
                            <th>V. Total</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Peças serão adicionadas aqui via JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="servico-section">
            <h2>Mão de Obra</h2>
            <div class="form-group">
                <label for="servico-desc">Descrição do Serviço:</label>
                <textarea id="servico-desc" rows="3" placeholder="Descreva o serviço realizado..."></textarea>
            </div>
            <div class="form-group">
                <label for="mao-de-obra-valor">Valor da Mão de Obra (R$):</label>
                <input type="number" id="mao-de-obra-valor" step="0.01" value="0.00">
            </div>
        </section>

        <section class="total-section">
            <div class="total-box">
                <p>Total Peças: <span id="total-pecas-display">R$ 0,00</span></p>
                <p>Mão de Obra: <span id="mao-de-obra-display">R$ 0,00</span></p>
                <h3 id="total-geral-display">Total Geral: R$ 0,00</h3>
            </div>
        </section>

        <section class="acoes-section">
            <button id="btn-pdf" class="btn-save">Salvar em PDF</button>
            <button id="btn-word" class="btn-save">Salvar em Word</button>
            <button id="btn-imprimir" class="btn-print">Imprimir Orçamento</button>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
